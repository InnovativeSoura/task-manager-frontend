<!-- Write an async function getWeather(city) that simulates fetching weather info with setTimeout. -->

<!DOCTYPE html>
<html>
<head>
    <title>Weather Simulation</title>
</head>

<body>

    <h1>Weather Information</h1>

    <input type="text" id="city" placeholder="Enter city name">

    <button onclick="showWeather()">
        Get Weather
    </button>

    <div id="output"></div>

    <script>

        // Async function
        async function getWeather(city) {

            return new Promise((resolve) => {

                // Simulate API delay
                setTimeout(() => {

                    let temperature = Math.floor(Math.random() * 15) + 20;

                    resolve(
                        "Weather in " + city + ": " +
                        temperature + "°C, Sunny"
                    );

                }, 3000);

            });

        }

        async function showWeather() {

            let city = document.getElementById("city").value;

            let output = document.getElementById("output");

            output.innerHTML = "<p>Fetching weather data...</p>";

            let result = await getWeather(city);

            output.innerHTML = "<h3>" + result + "</h3>";
        }

    </script>

</body>
</html>
