<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Extended Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

    <h1>Calculator</h1>

    <p id="output">Null!!</p>

    <script>
        let output = document.getElementById("output");

        let choice = prompt("Choose operation:\n1.Add\n2.Subtract\n3.Multiply\n4.Divide\n5.Even/Odd");

            // Clear previous output
            output.innerHTML = "";

            if (choice === "5") {
            let num = parseInt(prompt("Enter a number:"));

            if (num % 2 === 0) {
                output.innerHTML = "Even number";
            } else {
                output.innerHTML = "Odd number";
            }

            } else {
            let x = parseFloat(prompt("Enter first number:"));
            let y = parseFloat(prompt("Enter second number:"));

            switch (choice) {
                case "1":
                    output.innerHTML = `Result: ${x + y}`;
                break;

                case "2":
                    output.innerHTML = `Result: ${x - y}`;
                break;

                case "3":
                    output.innerHTML = `Result: ${x * y}`;
                break;

                case "4":
                if (y !== 0) {
                    output.innerHTML = `Result: ${x / y}`;
                } else {
                    output.innerHTML = "Cannot divide by zero";
                }
                break;

                default:
                    output.innerHTML = "Invalid choice";
            }
    };
    </script>

</body>
</html>
