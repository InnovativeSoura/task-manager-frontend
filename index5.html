<!-- Extend the Student Records App: Add a function addStudent() that takes user input. -->

<!DOCTYPE html>
<html>
<head>
    <title>Student Records App</title>
</head>
<body>

    <h2>Student Records App</h2>

    <label>Student Name:</label>
    <input type="text" id="studentName" placeholder="Enter name"><br><br>

    <label>Student Marks:</label>
    <input type="number" id="studentMarks" placeholder="Enter marks"><br><br>

    <button onclick="addStudent()">Add Student</button>

    <h3>Student Records:</h3>
    <ul id="studentList"></ul>

    <script>
        // Array to store students
        let students = [];

        // Function to add student
        function addStudent() {

            // Get input values
            let name = document.getElementById("studentName").value;
            let marks = document.getElementById("studentMarks").value;

            // Create student object
            let student = {
                name: name,
                marks: marks
            };

            // Add object to array
            students.push(student);

            // Display students
            displayStudents();

            // Clear input fields
            document.getElementById("studentName").value = "";
            document.getElementById("studentMarks").value = "";
        }

        // Function to display students
        function displayStudents() {

            let list = document.getElementById("studentList");

            // Clear old list
            list.innerHTML = "";

            // Loop through students array
            students.forEach(function(student, index) {

                let li = document.createElement("li");

                li.innerHTML =
                    "Student " + (index + 1) +
                    " → Name: " + student.name +
                    ", Marks: " + student.marks;

                list.appendChild(li);
            });
        }
    </script>

</body>
</html>
